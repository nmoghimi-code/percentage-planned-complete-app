name: Build Desktop App

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: PPCAnalyzer-windows
            executable_path: dist/PPCAnalyzer.exe
          - os: macos-latest
            artifact_name: PPCAnalyzer-macos
            executable_path: dist/PPCAnalyzer.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build Windows standalone app
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name PPCAnalyzer app.py

      - name: Build macOS app bundle
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --clean --windowed --name PPCAnalyzer app.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.executable_path }}
